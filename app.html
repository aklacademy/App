<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>word-app</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>

    <div class="phone">

        <div class="top-bar"> 

            <div class="top-title">Learning App</div>
            <div class="top-subtitle">Build your word power daily</div>

            <div class="progress-text"></div>

            <div class="progress-bar">

            <div class="progress-fill"></div>

        </div>

        </div>

        <div class="home-page" id="homePage"> 

        <div class="content">

            <button class="nav-button" onclick="openModePage('Vocabulary')">
                Vocabulary
            </button>

            <button class="nav-button">
                Idioms
            </button>

            <button class="nav-button">
                Verbal Phrases
            </button>

            <button class="nav-button">
                Grammar
            </button>

            </div>
            </div>

    <div class="mode-page" id="modePage">

    <div class="content">

        <button class="back-button" onclick="goHome()">
            Home
        </button>

        <button class="nav-button" onclick="openThemePage('Learn')">
            Learn
        </button>

        <button class="nav-button">
            Assessment
        </button>

        <button class="nav-button">
            Mastered
        </button>   

        <button class="nav-button">
            Revision
        </button>

    </div>

</div>

<div class="theme-page" id="themePage"> 

    <button class="back-button" onclick="goToModePage()">
        Home
    </button>

    <div class="page-title" id="themeTitle"></div>

    <div class="content" id="themeContainer">

</div>

</div>

<div class="list-page" id="listPage">

    <button class="back-button" onclick="goToThemePage()">
        Home
    </button>

    <div class="page-title" id="listTitle"></div>

    <div class="content" id="listContainer">


    </div>

</div>

    <div class="card" id="learnPage">

        <button class="back-button" onclick="goToListPage()">
            Home
        </button>

        <div class="page-title" id="learnTitle"></div>

         <div class="card-content">

    <h1 id="word"></h1>
        
    <img id="image">

        
        <div class="info-block">

    <div class="info-label">
        Part of Speech
    </div>

    <div id="partOfSpeech" class="info-value"></div>

</div>

        <div class="info-block">

    <div class="info-label">
        Pronunciation
    </div>

    <div id="pronunciation" class="info-value"></div>

</div>

        <p><strong>Definition:</strong>
        <span id="definition"></span></p>

        <p><strong>Synonyms:</strong>
        <span id="relatedWords"></span></p>

        <p><strong>Antonyms:</strong>
        <span id="oppositeWords"></span></p>

        <p><strong>Usage:</strong></p>

        <div id="usage"></div>

        <div class="buttons">

        <button class="previous-btn" onclick="previousWord()">
            Previous Word
        </button>

        <button class="next-btn" onclick="nextWord()">
            Next Word
        </button>

        <button class="previous-btn" onclick="restartLesson()">
    Restart
        </button>   

        </div>

    </div>

</div>
    
    
    <script src="app.js"></script>
</body>
</html>
